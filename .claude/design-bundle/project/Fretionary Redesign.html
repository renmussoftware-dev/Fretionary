<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fretionary — Premium Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0C; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; color: #F2F1EC; }
  * { box-sizing: border-box; }
  body { min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/CurrentScreen.jsx"></script>
<script type="text/babel" src="screens/RedesignedScreen.jsx"></script>
<script type="text/babel" src="screens/OtherTabs.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "obsidian",
  "showCurrent": true
}/*EDITMODE-END*/;

function Notes({ theme }) {
  const t = window.THEMES[theme];
  const items = [
    { h: 'Type system', b: 'Inter (UI) + JetBrains Mono (note labels, formulas, fret numbers, tunings). Mono is the “precision instrument” cue — every numeric value uses tabular numerals so they line up.' },
    { h: 'Surface system', b: 'Translucent layered surfaces over a single warm-tinted background instead of stacked filled panels. 1px hairlines at low opacity replace heavy borders. Glass blur on header and tab bar.' },
    { h: 'Note color palette', b: 'Same identity as today — yellow root, red 3rd, green 5th, blue ext — rebalanced in oklch at uniform chroma. They now harmonize instead of competing.' },
    { h: 'Fretboard hierarchy', b: 'Out-of-position notes shrink to 86% and drop to 32% opacity (vs equal-weight today). Active root gets a soft radial glow. Position highlight uses a vertical gradient rather than flat fill + harsh outline.' },
    { h: 'Root note picker', b: 'Replaces the row of identical pills with a piano-key strip — naturals vs sharps are visually obvious. Active key gets a colored glow + ring.' },
    { h: 'Mode segmented control', b: 'Sliding indicator with subtle inset highlight + drop shadow. 220ms cubic-bezier transition.' },
    { h: 'Chips, not buttons', b: 'Border-only pills become surface-fill chips. Active state = soft tinted fill + ring + subtle glow. Locked items get a quiet diamond glyph instead of an emoji lock.' },
    { h: 'Info panel', b: 'Three separate cards collapse into one consolidated bar with hairline dividers — quieter, denser, more reference-card-feeling. Mono values for scannable theory data.' },
    { h: 'Tab bar', b: 'Hand-drawn line icons with consistent 1.6 stroke. Active tab gets a pill background, not just a tinted color — much more legible.' },
    { h: 'Spacing', b: 'Bumped to a 4pt grid. Padding generally +25%. Section labels are smaller, all-caps mono, with 1.2 letter-spacing — feels like a technical document.' },
  ];
  return (
    <div style={{
      width: 520, padding: '24px 28px',
      background: t.surface,
      border: `1px solid ${t.hairline}`,
      borderRadius: 16,
      color: t.text,
      fontSize: 13, lineHeight: 1.55,
    }}>
      <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1.2, textTransform: 'uppercase', color: t.textFaint, fontFamily: 'JetBrains Mono, monospace', marginBottom: 14 }}>Design rationale</div>
      <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.4, marginBottom: 18 }}>What changed and why</div>
      {items.map(i => (
        <div key={i.h} style={{ marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${t.hairline}` }}>
          <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4, color: t.text }}>{i.h}</div>
          <div style={{ color: t.textMuted, fontSize: 12.5, lineHeight: 1.6 }}>{i.b}</div>
        </div>
      ))}
      <div style={{ fontSize: 11, color: t.textFaint, marginTop: 4 }}>
        Toggle Tweaks (top-right) to switch between the three visual directions: Obsidian (default), Ivory (light mode), and Studio (warm wood + amber).
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const themeKey = tweaks.theme || 'obsidian';
  const theme = window.THEMES[themeKey];
  const isLight = themeKey === 'ivory';

  return (
    <>
      <window.DesignCanvas
        background={isLight ? '#EAE7DD' : '#070708'}
        title="Fretionary — Premium Redesign"
        subtitle="Hi-fi exploration • compare current vs redesigned, switch direction in Tweaks"
      >
        <window.DCSection id="fretboard" title="Fretboard tab — current vs redesigned">

          {tweaks.showCurrent && (
            <window.DCArtboard id="current" label="Current — Fretboard tab" width={402} height={874}>
              <window.IOSDevice width={402} height={874} dark={true}>
                <window.CurrentScreen />
              </window.IOSDevice>
            </window.DCArtboard>
          )}

          <window.DCArtboard id="redesigned" label={`Redesigned — ${theme.name}`} width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.RedesignedScreen tweaks={tweaks} />
            </window.IOSDevice>
          </window.DCArtboard>

          <window.DCArtboard id="rationale" label="Notes" width={580} height={844}>
            <Notes theme={themeKey} />
          </window.DCArtboard>

        </window.DCSection>

        <window.DCSection id="other-tabs" title="Other tabs — redesigned">

          <window.DCArtboard id="chords-tab" label="Chords tab" width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.ChordsTabRedesign theme={theme} isLight={isLight} />
            </window.IOSDevice>
          </window.DCArtboard>

          <window.DCArtboard id="scales-tab" label="Scales tab" width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.ScalesTabRedesign theme={theme} isLight={isLight} />
            </window.IOSDevice>
          </window.DCArtboard>

          <window.DCArtboard id="caged-tab" label="CAGED tab" width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.CagedTabRedesign theme={theme} isLight={isLight} />
            </window.IOSDevice>
          </window.DCArtboard>

          <window.DCArtboard id="prog-tab" label="Progressions tab" width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.ProgressionsTabRedesign theme={theme} isLight={isLight} />
            </window.IOSDevice>
          </window.DCArtboard>

          <window.DCArtboard id="tools-tab" label="Tools tab — Metronome" width={402} height={874}>
            <window.IOSDevice width={402} height={874} dark={!isLight}>
              <window.ToolsTabRedesign theme={theme} isLight={isLight} />
            </window.IOSDevice>
          </window.DCArtboard>

        </window.DCSection>
      </window.DesignCanvas>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Visual direction">
          <window.TweakRadio
            label="Theme"
            value={tweaks.theme}
            options={[
              { label: 'Obsidian', value: 'obsidian' },
              { label: 'Ivory', value: 'ivory' },
              { label: 'Studio', value: 'studio' },
            ]}
            onChange={v => setTweak('theme', v)}
          />
        </window.TweakSection>
        <window.TweakSection title="Layout">
          <window.TweakToggle
            label="Show current design alongside"
            value={tweaks.showCurrent}
            onChange={v => setTweak('showCurrent', v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
